name: CI

on:
  push:
    branches: [staging, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npx tsc -p tsconfig.json --noEmit
      - run: npm run build

      - run: npm --prefix api ci
      - run: npm --prefix api test
