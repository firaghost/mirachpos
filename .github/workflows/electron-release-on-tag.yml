name: Release Electron (Tag)

on:
  push:
    tags:
      - 'desktop-v*.*.*'
  workflow_dispatch:

concurrency:
  group: electron-release
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      NPM_CONFIG_MSVS_VERSION: 2022
      GYP_MSVS_VERSION: 2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install VS Build Tools (C++)
        run: choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --includeOptional --passive --norestart"

      - name: Verify Visual Studio installation
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

      - run: npm ci
      - run: npm run build:desktop
      - run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}