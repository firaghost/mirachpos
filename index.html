<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; img-src 'self' data: https: http:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline'; connect-src 'self' https: http: ws: wss:;" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MirachPos</title>
    <link rel="icon" href="./app.icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Noto+Sans:wght@300..800&display=swap"
      crossorigin="anonymous"
      onload="this.onload=null;this.rel='stylesheet'"
    >
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      crossorigin="anonymous"
      onload="this.onload=null;this.rel='stylesheet'"
    >
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Noto+Sans:wght@300..800&display=swap" rel="stylesheet" crossorigin="anonymous">
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" crossorigin="anonymous" />
    </noscript>
    <script>
      (function () {
        try {
          var THEME_PREFERENCE_KEY = 'mirachpos.theme.preference.v1';
          var LEGACY_THEME_KEY = 'theme';
          var pref = localStorage.getItem(THEME_PREFERENCE_KEY);
          if (pref !== 'light' && pref !== 'dark' && pref !== 'system') {
            var legacy = localStorage.getItem(LEGACY_THEME_KEY);
            if (legacy === 'light' || legacy === 'dark') pref = legacy;
            else pref = 'system';
          }
          var theme = pref;
          if (pref === 'system') {
            theme = 'dark';
            try {
              if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) theme = 'light';
            } catch {
            }
          }
          var root = document.documentElement;
          if (theme === 'light') {
            root.classList.remove('dark');
            root.classList.add('light');
          } else {
            root.classList.add('dark');
            root.classList.remove('light');
          }
        } catch {
        }
      })();

      window.__mirachposBranding = {
        platformName: 'MirachPos',
        logoUrl: './mirach.png',
        primaryColor: '#eead2b',
        accentColor: '#c9b792',
      };

      const __applyBrandingVars = (b) => {
        try {
          const root = document.documentElement;
          const primary = (b && typeof b.primaryColor === 'string' && b.primaryColor.trim()) ? b.primaryColor.trim() : '#eead2b';
          const accent = (b && typeof b.accentColor === 'string' && b.accentColor.trim()) ? b.accentColor.trim() : '#c9b792';
          root.style.setProperty('--mirach-primary', primary);
          root.style.setProperty('--mirach-accent', accent);
          root.style.setProperty('--mirach-primary-hover', primary);
          if (b && typeof b.platformName === 'string' && b.platformName.trim()) {
            document.title = b.platformName.trim();
          }
          try {
            window.dispatchEvent(new CustomEvent('mirachpos-branding-changed', { detail: b || null }));
          } catch {
            // ignore
          }
        } catch {
          // ignore
        }
      };

      __applyBrandingVars(window.__mirachposBranding);

      (async () => {
        try {
          const isFile = (window.location && window.location.protocol === 'file:');
          const isLocalhost = (window.location && (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'));
          const isApps = (window.location && window.location.hostname === 'apps.mirachpos.com');
          const cfgApi = (window.mirachpos && window.mirachpos.config && typeof window.mirachpos.config.apiBase === 'string') ? window.mirachpos.config.apiBase.trim() : '';
          const apiBase = cfgApi ? cfgApi.replace(/\/+$/, '') : ((isFile || isLocalhost) ? 'http://127.0.0.1:3001' : (isApps ? 'https://apa.mirachpos.com' : ''));
          const ws = (() => {
            try {
              return (localStorage.getItem('mirachpos.lastWorkspace.v1') || '').trim().toLowerCase();
            } catch {
              return '';
            }
          })();
          const headers = {};
          if (ws && ws !== 'default') headers['X-Tenant'] = ws;
          const res = await fetch(`${apiBase}/api/public/platform-settings`, { headers });
          const json = await res.json().catch(() => null);
          const branding = json?.settings?.branding || {};
          window.__mirachposBranding = {
            platformName: String(json?.settings?.platformName || 'MirachPos'),
            logoUrl: String(branding?.logoUrl || './mirach.png'), 
            primaryColor: String(branding?.primaryColor || '#eead2b'),
            accentColor: String(branding?.accentColor || '#c9b792'),
          };
          __applyBrandingVars(window.__mirachposBranding);
        } catch {
          // ignore
        }
      })();

    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #221c10;
      }
      ::-webkit-scrollbar-thumb {
        background: #483c23;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--mirach-primary);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .icon-filled {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
    <link rel="stylesheet" href="./index.css">
  </head>
  <body class="bg-background text-text-main h-screen overflow-hidden">
    <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
